name: Build and Release Installer

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Trigger bei neuen Versions-Tags (z.B. v1.0.0)
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Zwingend erforderlich, um Releases zu erstellen

    steps:
    - name: Quellcode auschecken
      uses: actions/checkout@v4

    - name: Systemabhängigkeiten installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make pkg-config libgtk-3-dev tar

    - name: Standard-Version kompilieren (Void Linux)
      run: make

    - name: Universal-Version kompilieren
      run: make universal

    - name: Release-Archiv packen
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # Packt Binärdateien, .desktop und Logo in ein sauberes .tar.gz
        tar -czvf gnuslashlinux_installer.tar.gz \
          gnuslashlinux_installer \
          gnuslashlinux_installer_universal \
          gnuslashlinux_installer.desktop \
          logo.png \
          Makefile

    - name: GitHub Release erstellen und Assets hochladen
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          gnuslashlinux_installer
          gnuslashlinux_installer_universal
          gnuslashlinux_installer.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
